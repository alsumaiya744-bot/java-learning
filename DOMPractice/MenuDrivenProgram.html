<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        #box {
            margin-top: 20px;
            padding: 10px;
            border: 2px solid black;
            
        }
    </style>
</head>
<body>
    <h1>Menu Driven Program</h1>
    <button onclick="readText()">Read Text</button>
    <br>
    <button onclick="addNumbers()">Add Two Numbers</button>
    <br>
    <button onclick="changeBackground()">Change Background Color</button>
    <br>
    <button onclick="exit()">Exit</button>
    <hr>
    <p id="para">lorem2020 ipsum dolor sit amet consectetur
         adipisicing elit. Voluptas, voluptate!
         Molestias, voluptate.
    </p>
    <hr>
    <label>Number 1:</label>
    <input type="number" id="num1" placeholder="Enter first number">
    <br>
    <label>Number 2:</label>
    <input type="number" id="num2" placeholder="Enter second number">
    <br>
    <h2>Result:</h2>
    <p id="result"></p>
<hr>
    <h2>Style Customizer</h2>



    <input type="text" id="bg" placeholder="Enter background color">
    <input type="text" id="textColor" placeholder="Enter text color">
    <input type="text" id="fontSize" placeholder="Enter font size (e.g., 20)">
    <input type="text" id="borderColor" placeholder="Enter border color">
    <input type="text" id="boxWidth" placeholder="Enter box width">
    <input type="text" id="boxHeight" placeholder="Enter box height">
</body>
    <div id="box">
        <h3>Styled Box</h3>
    </div>

    <hr>
    <h2 id="exiting"></h2>
    <script>
        function readText()
        {
            const text = document.getElementById("para").innerText;
            alert("Text is : "+text);
        }
        function addNumbers()
        {
            const num1=document.getElementById("num1").value;
            const num2=document.getElementById("num2").value;
            const sum=parseInt(num1)+parseInt(num2);
            document.getElementById("result").innerText=sum;
        }
        function changeBackground()
        {
            const bgColor=document.getElementById("bg").value;
            const txtColor=document.getElementById("textColor").value;
            const fontSize=document.getElementById("fontSize").value;
            const borderColor=document.getElementById("borderColor").value;
            const boxWidth=document.getElementById("boxWidth").value;
            const boxHeight=document.getElementById("boxHeight").value;
            const box=document.getElementById("box");
            box.style.backgroundColor=bgColor;
            box.style.color=txtColor;
            box.style.fontSize=fontSize+"px";
            box.style.border="2px solid "+borderColor;
            box.style.width=boxWidth+"px";
            box.style.height=boxHeight+"px";
            
        }
        function exit()
        {
            if(confirm("Are you sure you want to exit?"))
            {
                const exitingMessage=document.getElementById("exiting").innerHTML="Exiting the program...";
                window.close();
            }
        }
    </script>

</body>
</html>
