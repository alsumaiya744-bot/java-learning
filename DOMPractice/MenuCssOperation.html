<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=2, initial-scale=1.0">
    <title>Document</title>
    <style>
        #textOutputBox {
            margin-top: 20px;
            padding: 10px;
            border: 2px solid black;
            width: 300px;
            height: 100px;
            background-color: gray;
        }
    </style>
</head>
<body>
   <h1>CSS Operations Using DOM</h1> 
   <hr style="border: 1px solid black;">
   <label>Enter text : </label>
   <input type="text" id="textInput" placeholder="Enter text here">
    <br>
    <button onclick="showText()">Show Text</button>
    <div id="textOutputBox">
        <p id="textOutput"></p>
    </div>
    <hr>
    <h2>Change Styles Menu</h2>
    <br>
    <button onclick="changeColor()">Change Text Color</button>
    <br>
    <button onclick="changeFontSize()">Change Font Size</button>
    <br>
    <button onclick="hideElement()">Hide Element</button>
    <br>
    <button onclick="showElement()">Show Element</button>
    <hr>
    <h2>Change Color</h2>
    <input type="text" id="colorInput" placeholder="Enter text color">
    <p id="colorOutput"></p>
    <hr>
    <h2>Change Font Size</h2>
    <input type="text" id="fontSizeInput" placeholder="Enter font size (e.g., 20)">
    <p id="fontSizeOutput"></p>
    <hr>
    <script>
        function showText()
        {
            const text=document.getElementById("textInput").value;
            document.getElementById("textOutput").innerText=text;
        } 
        function changeColor()
        {
            const text=document.getElementById("textInput").value;
            const color=document.getElementById("colorInput").value;
            const output=document.getElementById("colorOutput");
            output.innerText=text;
            output.style.color=color;

        }

        function changeFontSize()
        {
           const text=document.getElementById("textInput").value;
           const fontSize=document.getElementById("fontSizeInput").value;
           const output=document.getElementById("fontSizeOutput");
           output.innerText=text;
           output.style.fontSize=fontSize+"px";
        }
        function hideElement()
        {
            const element=document.getElementById("textOutputBox");
            element.style.display="none";
        }
        function showElement()
        {
            const element=document.getElementById("textOutputBox");
            element.style.display="block";
        }
  </script>    
</body>
</html>
